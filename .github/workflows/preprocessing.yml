name: Data Preprocessing Pipeline

on:
  push:
    paths:
      - 'dataset_raw/**'
      - 'preprocessing/automate_Rafi.py'
  workflow_dispatch:

jobs:
  build-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Execute Preprocessing Script
        run: |
          python preprocessing/automate_Rafi.py

      - name: Commit and Push Processed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/dataset_preprocessing/
          git commit -m "Auto-generate preprocessed dataset" || echo "No changes to commit"
          git push